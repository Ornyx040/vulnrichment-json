name: Update Vulnrichment JSON

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-json:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Clone Vulnrichment repository
        run: git clone https://github.com/cisagov/vulnrichment.git

      - name: Combine Vulnrichment JSON files
        run: python combine.py
        
      # EPSSデータのダウンロードと解凍
      - name: Download and Extract EPSS Data
        run: |
          pip install requests
          python epss_update.py

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add vulnrichment_all.json epss_scores-current.csv
          git commit -m "Automated update of Vulnrichment and EPSS data" || echo "No changes to commit"
          git push
